# ==========================================================================
#  ALL-IN-ONE: a realistic 4-service stack using every key Compose feature.
#  web (nginx reverse proxy)  ->  api (built)  ->  db (postgres) + cache (redis)
#  Read each comment — this is the summary of the whole lab.
# ==========================================================================

# Extension field + anchor: shared defaults reused across services (see 15).
x-defaults: &defaults
  restart: unless-stopped        # survive crashes & reboots (see 11)

services:
  # ---- WEB: public entrypoint, reverse-proxies to the api ----
  web:
    <<: *defaults
    image: nginx:alpine          # prebuilt image (see 02)
    ports:
      - "8080:80"                # published to the host (see 04)
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro   # bind mount (see 07)
      - ./web/index.html:/usr/share/nginx/html/index.html:ro
    networks: [frontend]         # only on the frontend net (see 08)
    depends_on:
      api:
        condition: service_healthy    # wait until api is healthy (see 09)
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---- API: our own code, BUILT from a Dockerfile ----
  api:
    <<: *defaults
    build:
      context: ./api             # build from ./api/Dockerfile (see 03)
      args:
        APP_VERSION: "1.0"
    image: lab-compose-api:1.0
    env_file:
      - app.env                  # config loaded from a file (see 06)
    environment:
      REDIS_HOST: cache          # reach other services by name (see 08)
      DB_HOST: db
    secrets:
      - db_password              # mounted at /run/secrets (see 16)
    networks: [frontend, backend]   # bridges public + private nets
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---- DB: stateful, on a PRIVATE network, data in a named volume ----
  db:
    <<: *defaults
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sunrise
      POSTGRES_DB: sunrise
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - db-data:/var/lib/postgresql/data    # persist across restarts (see 07)
    networks: [backend]          # NOT reachable from the frontend / host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunrise"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- CACHE: private, ephemeral ----
  cache:
    <<: *defaults
    image: redis:7-alpine
    networks: [backend]

  # ---- SEED: optional one-off job, only with --profile setup (see 14) ----
  seed:
    image: postgres:16-alpine
    profiles: ["setup"]
    environment:
      PGPASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    networks: [backend]
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - 'PGPASSWORD=$$(cat /run/secrets/db_password) psql -h db -U sunrise -d sunrise -c "SELECT 1 AS seeded;"'

networks:
  frontend:
  backend:

volumes:
  db-data:

secrets:
  db_password:
    file: ./db_password.txt
