# See README.md for full notes.
# `restart` tells Docker what to do when a container EXITS or the daemon restarts.
services:
  flaky:
    image: alpine:3.20
    restart: on-failure          # restart only if it exits non-zero
    command: sh -c 'echo "starting..."; sleep 2; echo "crashing!"; exit 1'

  always-up:
    image: nginx:alpine
    restart: unless-stopped      # keep it running across reboots unless YOU stop it
