default:
  image: 
    name: node:20-alpine
    pull_policy: ["if-not-present"]

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

stages:
  - install
  - test
  - build
  - deploy

install_dependencies:
  stage: install
  script:
    - npm ci
  only:
    - develop

test-job:
  stage: test
  dependencies:
      - install_dependencies
  script:
    - npm run test
  only:
    - develop
  artifacts:
    when: always
    reports:
      junit: junit.xml

e2e-test-job:
  stage: test
  dependencies:
      - install_dependencies
  script:
    - echo "e2e test"
  only:
    - develop

build-job:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    IMAGE_TAG: ${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
  cache: []
  only:
    - develop
  before_script:
      - echo "$CI_REGISTRY_IMAGE"
      - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$IMAGE_TAG .
    - docker push $CI_REGISTRY_IMAGE:$IMAGE_TAG
    - echo $CI_JOB_STATUS
  after_script:
    - echo $CI_JOB_STATUS
  
deploy:
  stage: deploy
  variables:
    IMAGE_TAG: ${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
  only:
    - develop
  before_script:
    - apk add --no-cache ansible openssh-client
  script:
    - echo "${SSH_PRIVATE_KEY}"
    - echo "${SSH_PRIVATE_KEY}" | sed 's/\\n/\n/g' > id_rsa
    - chmod 600 id_rsa
    - cat id_rsa
    - ANSIBLE_CONFIG=./ansible.cfg ansible-playbook ansible/playbook.yml
  after_script:
    - rm id_rsa
